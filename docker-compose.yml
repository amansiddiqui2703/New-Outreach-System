version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: automindz-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: automindz-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: automindz-server
    ports:
      - '5000:5000'
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/automindz
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: automindz-client
    ports:
      - '5173:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
